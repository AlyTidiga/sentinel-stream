global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'flink'
    static_configs:
      - targets: ['flink-jobmanager:9249']

  - job_name: 'sentinel-ml-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
